# NoodleBomb production — premium editorial design (POUR IT ON EVERYTHING)
# Static deploy — index.html + 6 .jsx files + uploads/ images served from repo root
# Pages: index.html (landing), cart.html (/cart), checkout.html (/checkout)
# Vite build is skipped via no-op command + ignore.
# To roll back to the React/Vite SPA, restore this file to commit 862db66 and revert index.html.

[build]
  # Compiles repo-root *.jsx → build/*.js via esbuild, replacing the prior
  # Babel-in-browser setup (~770KB shipped to every visitor, gone). Netlify
  # auto-runs `npm install` first to fetch esbuild from devDeps.
  command = "npm run build:static"
  publish = "."
  ignore = "/bin/false"

# Block repo internals from being served. publish = "." means every file at
# the root gets deployed, including /src/ (dormant Vite tree), /node_modules/,
# /supabase/config.toml, package.json, and lockfiles. robots.txt only deters
# search engines — these rules return 404 to anyone fetching the paths
# directly, with force = true to override the filesystem match.
[[redirects]]
  from = "/src/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/supabase/*"
  to = "/404.html"
  status = 404
  force = true

# /dist/ is a stale Vite build (different homepage, sitemap with broken
# paths and a "yuzu" reference banned per commit a577290).
[[redirects]]
  from = "/dist/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/bun.lock*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tsconfig*.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/vite.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/vitest.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/postcss.config.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tailwind.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/eslint.config.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/components.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/cart-store.js.bak*"
  to = "/404.html"
  status = 404
  force = true

# JSX source files — compiled to /build/*.js by esbuild on deploy. The
# source remains in the repo for diff/review but isn't needed at runtime.
[[redirects]]
  from = "/*.jsx"
  to = "/404.html"
  status = 404
  force = true

# Dotfiles — .env contains only Supabase publishable keys (safe to expose by
# design) but leaking the file is poor hygiene; .gitignore is harmless but
# pollutes the surface area.
[[redirects]]
  from = "/.env*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.gitignore"
  to = "/404.html"
  status = 404
  force = true

# Wix-pattern URLs that may appear in old links — bounce to the live store
[[redirects]]
  from = "/product-page/*"
  to = "https://shop.noodlebomb.co/product-page/:splat"
  status = 302
  force = true

[[redirects]]
  from = "/cart-page"
  to = "https://shop.noodlebomb.co/cart-page"
  status = 302
  force = true

# Pretty URLs for the new local cart/checkout pages
# (Netlify automatically serves cart.html for /cart, but force=false ensures
#  it doesn't conflict with anything else and is explicit.)
[[redirects]]
  from = "/cart"
  to = "/cart.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/checkout.html"
  status = 200

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=300, must-revalidate"

# Compiled bundles — same short-cache treatment as the source .jsx
# (no content hashing yet; if added later, switch to immutable + 1y).
[[headers]]
  for = "/build/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# cart-store.js is the cart logic — short cache so threshold/price updates
# propagate quickly. Same revalidate behavior as the .jsx files.
[[headers]]
  for = "/cart-store.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages — always revalidate so updates ship immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cart.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/checkout.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/404.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Favicon — long cache, the file rarely changes.
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
