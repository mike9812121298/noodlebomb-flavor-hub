# NoodleBomb production — premium editorial design (POUR IT ON EVERYTHING)
# Static deploy — index.html + 4 .jsx files + uploads/ images served from repo root
# Vite build is skipped via no-op command + ignore.
# To roll back to the React/Vite SPA, restore this file to commit 862db66 and revert index.html.

[build]
  command = "echo 'Static deploy - serving index.html from repo root.'"
  publish = "."
  ignore = "/bin/false"

[[redirects]]
  from = "/product-page/*"
  to = "https://mikejmarch.wixstudio.com/mysite-5/product-page/:splat"
  status = 302
  force = true

[[redirects]]
  from = "/cart-page"
  to = "https://mikejmarch.wixstudio.com/mysite-5/cart-page"
  status = 302
  force = true

[[redirects]]
  from = "/cart"
  to = "https://mikejmarch.wixstudio.com/mysite-5/cart-page"
  status = 302
  force = true

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
