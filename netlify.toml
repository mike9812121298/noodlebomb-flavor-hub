  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/bun.lock*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tsconfig*.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/vite.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/vitest.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/postcss.config.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tailwind.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/eslint.config.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/components.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/cart-store.js.bak*"
  to = "/404.html"
  status = 404
  force = true

# JSX source files — compiled to /build/*.js by esbuild on deploy. The
# source remains in the repo for diff/review but isn't needed at runtime.
# NOTE: Netlify's `/*.jsx` glob silently does NOT override existing static
# files (verified live 2026-04-30: /app.jsx returned 200 despite the rule).
# Enumerate every known source file explicitly. The trailing `/*.jsx` rule
# stays as a defense-in-depth catch for any future .jsx that gets added.
[[redirects]]
  from = "/app.jsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/components.jsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/cart.jsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/checkout.jsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/monthly-drop.jsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/next-drop.jsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.jsx"
  to = "/404.html"
  status = 404
  force = true

# Dotfiles — .env contains only Supabase publishable keys (safe to expose by
# design) but leaking the file is poor hygiene; .gitignore is harmless but
# pollutes the surface area.
[[redirects]]
  from = "/.env*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.gitignore"
  to = "/404.html"
  status = 404
  force = true

