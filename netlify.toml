[[headers]]
  for = "/*.jsx"
  [headers.values]
  Content-Type = "application/javascript; charset=utf-8"
  Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
  Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
  Cache-Control = "public, max-age=300, must-revalidate"

# Compiled bundles - same short-cache treatment as the source .jsx
# (no content hashing yet; if added later, switch to immutable + 1y).
[[headers]]
  for = "/build/*"
  [headers.values]
  Cache-Control = "public, max-age=300, must-revalidate"

# cart-store.js is the cart logic - short cache so threshold/price updates
# propagate quickly. Same revalidate behavior as the .jsx files.
[[headers]]
  for = "/cart-store.js"
  [headers.values]
  Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/uploads/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# HTML pages - always revalidate so updates ship immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cart.html"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/checkout.html"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/404.html"
  [headers.values]
  Cache-Control = "public, max-age=3600"

# Favicon - long cache, the file rarely changes.
[[headers]]
  for = "/favicon.ico"
  [headers.values]
  Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
  X-Frame-Options = "SAMEORIGIN"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Content-Security-Policy = "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self' https://formsubmit.co https://nu2vqa-ma.myshopify.com"

