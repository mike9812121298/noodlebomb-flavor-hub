# Any /shop/* deep link also lands on the branded catalog rather than the
# bare Shopify storefront. The :splat is consumed explicitly in the query so
# Netlify doesn't auto-append it to the path (which would self-loop to
# /shop/<splat> and 404); shop.html ignores the query.
[[redirects]]
  from = "/shop/*"
  to = "/shop?s=:splat"
  status = 301
  force = true

