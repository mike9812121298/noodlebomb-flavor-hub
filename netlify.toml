# NoodleBomb production — premium editorial design (POUR IT ON EVERYTHING)
# Static deploy — index.html + 6 .jsx files + uploads/ images served from repo root
# Pages: index.html (landing), cart.html (/cart), checkout.html (/checkout)
# Vite build is skipped via no-op command + ignore.
# To roll back to the React/Vite SPA, restore this file to commit 862db66 and revert index.html.

[build]
  command = "echo 'Static deploy - serving index.html from repo root.'"
  publish = "."
  ignore = "/bin/false"

# Block repo internals from being served. publish = "." means every file at
# the root gets deployed, including /src/ (dormant Vite tree), /node_modules/,
# /supabase/config.toml, package.json, and lockfiles. robots.txt only deters
# search engines — these rules return 404 to anyone fetching the paths
# directly, with force = true to override the filesystem match.
[[redirects]]
  from = "/src/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/supabase/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/bun.lock*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tsconfig*.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/vite.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/vitest.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/postcss.config.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tailwind.config.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/eslint.config.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/components.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/cart-store.js.bak*"
  to = "/404.html"
  status = 404
  force = true

# Wix-pattern URLs that may appear in old links — bounce to the live store
[[redirects]]
  from = "/product-page/*"
  to = "https://shop.noodlebomb.co/product-page/:splat"
  status = 302
  force = true

[[redirects]]
  from = "/cart-page"
  to = "https://shop.noodlebomb.co/cart-page"
  status = 302
  force = true

# Pretty URLs for the new local cart/checkout pages
# (Netlify automatically serves cart.html for /cart, but force=false ensures
#  it doesn't conflict with anything else and is explicit.)
[[redirects]]
  from = "/cart"
  to = "/cart.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/checkout.html"
  status = 200

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
