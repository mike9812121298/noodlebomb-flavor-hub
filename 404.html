<!DOCTYPE html>
<html lang="en" style="--accent: #8B1E1E; --accent-ink: #F5F1EA;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0E0D0C">
<title>Not found — NoodleBomb</title>
<meta name="description" content="The page you were looking for doesn't exist." />
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;700&family=Inter:wght@400&family=Fraunces:ital,wght@1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #0E0D0C; color: #F0EBE3;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body { display: flex; align-items: center; justify-content: center; padding: 24px; }
.wrap { max-width: 560px; text-align: center; }
.brand-mark {
  width: 32px; height: 32px; border-radius: 6px;
  background: var(--accent); color: var(--accent-ink);
  font-family: 'Inter Tight', sans-serif; font-weight: 800; font-size: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
}
.eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(240,235,227,0.45); margin-bottom: 24px;
}
h1 {
  font-family: 'Inter Tight', sans-serif; font-weight: 700;
  font-size: clamp(48px, 8vw, 88px); letter-spacing: -0.04em;
  line-height: 0.95; margin: 0 0 8px;
}
h1 em {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 400;
  color: var(--accent);
}
p {
  font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.55;
  color: rgba(240,235,227,0.78); margin: 24px auto 32px; max-width: 440px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  padding: 16px 28px; border-radius: 999px;
  background: var(--accent); color: var(--accent-ink);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none;
  transition: transform .25s, box-shadow .25s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(139,30,30,0.35); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand-mark">N</div>
    <div class="eyebrow">404 · Not found</div>
    <h1>Wrong <em>bowl.</em></h1>
    <p>The page you were looking for doesn't exist — or it moved. Head back to the lineup and start fresh.</p>
    <a class="btn" href="/">← Back to NoodleBomb</a>
  </div>
</body>
</html>
