  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoodleBomb Offline</title>
  <meta name="theme-color" content="#0E0D0C">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background: radial-gradient(circle at 70% 20%, rgba(212,162,74,.24), transparent 34%), #0e0d0c;
      color: #f5f1ea;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(520px, 100%);
      border: 1px solid rgba(245,241,234,.16);
      border-radius: 18px;
      padding: 28px;
      background: rgba(14,13,12,.82);
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
    }
    .mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      border-radius: 999px;
      background: #d4a24a;
      color: #0e0d0c;
      font-weight: 900;
      letter-spacing: -.04em;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 10vw, 58px);
      line-height: .92;
      letter-spacing: -.04em;
    }
    p {
      margin: 0 0 22px;
      color: rgba(245,241,234,.72);
      line-height: 1.55;
    }
    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 999px;
      background: #d4a24a;
      color: #0e0d0c;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">N</div>
    <h1>You are offline.</h1>
    <p>NoodleBomb is saved on your device, but this page needs a connection. Come back online and the shop will reload.</p>
    <a href="/">Try again</a>
  </main>
</body>
