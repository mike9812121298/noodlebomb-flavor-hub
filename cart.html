<style>
:root {
  --ink: #F0EBE3;
  --ink-60: rgba(240,235,227,0.78);
  --ink-40: rgba(240,235,227,0.70);
  --ink-20: rgba(240,235,227,0.45);
  --paper: #0E0D0C;
  --paper-2: #17140F;
  --paper-3: #1F1B15;
  --line: rgba(240,235,227,0.08);
  --line-strong: rgba(240,235,227,0.14);
  --accent: #E84A3A;
  --accent-ink: #0E0D0C;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
.skip-to-content {
  position: absolute; top: 0; left: 0;
  transform: translateY(-110%);
  background: var(--accent); color: var(--accent-ink);
  padding: 12px 20px;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 0.02em; text-decoration: none;
  z-index: 200;
  transition: transform .2s cubic-bezier(.2,.7,.2,1);
}
.skip-to-content:focus { transform: translateY(0); outline: 2px solid var(--ink); outline-offset: 2px; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  background:
    radial-gradient(circle at 78% 8%, rgba(232,74,58,0.16), transparent 28%),
    radial-gradient(circle at 12% 82%, rgba(212,162,74,0.10), transparent 28%),
    linear-gradient(180deg, #0E0D0C 0%, #100E0B 48%, #0E0D0C 100%);
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.035;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.8'/></svg>");
  z-index: 0;
}
.display { font-family: 'Inter Tight', sans-serif; font-weight: 700; letter-spacing: -0.04em; }
.serif { font-family: 'Inter Tight', sans-serif; font-weight: 800; letter-spacing: -0.045em; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
::selection { background: var(--accent); color: var(--accent-ink); }
a { color: inherit; }
.checkout-error-banner {
  display: none;
  margin: 0 0 18px;
  padding: 14px 16px;
  border: 1px solid rgba(232,74,58,0.55);
  border-radius: 8px;
  background: rgba(232,74,58,0.12);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}
.checkout-error-banner.is-visible { display: block; }

.nav-cart {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 72px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 18px;
  padding: 0 clamp(24px, 5.5vw, 80px);
  background: rgba(14,13,12,0.82);
  backdrop-filter: saturate(140%) blur(12px);
  -webkit-backdrop-filter: saturate(140%) blur(12px);
  border-bottom: 1px solid var(--line);
}
.nav-cart .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.nav-cart .brand-mark {
  width: 18px; height: 18px; border-radius: 4px;
  background: var(--accent); color: var(--accent-ink);
  font-family: 'Inter Tight'; font-weight: 800; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}
.nav-cart .brand-name { font-family: 'Inter Tight'; font-weight: 700; font-size: 16px; letter-spacing: -0.04em; }
.nav-cart-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
.nav-cart-link {
  min-height: 42px;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0 14px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink);
  text-decoration: none;
  transition: color .2s, background .2s, border-color .2s, transform .2s;
}
.nav-cart-link:hover { color: var(--ink); border-color: var(--ink); background: rgba(240,235,227,0.05); transform: translateY(-1px); }
.nav-cart-link.is-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  letter-spacing: 0.12em;
}
@media (max-width: 760px) {
  .nav-cart { height: auto; min-height: 72px; padding-top: 12px; padding-bottom: 12px; align-items: flex-start; }
  .nav-cart-actions { gap: 6px; max-width: 58vw; }
  .nav-cart-link { min-height: 38px; padding: 0 11px; font-size: 9px; }
  .nav-cart-link.optional { display: none; }
}

main { position: relative; z-index: 1; padding-top: 96px; padding-bottom: 140px; min-height: 100vh; }
.container { max-width: 1180px; margin: 0 auto; padding: 0 clamp(24px, 5.5vw, 80px); }

.crumb {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--ink-60); text-decoration: none; transition: color .2s;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 24px;
}
.crumb:hover { color: var(--ink); }

h1.page-title { font-family: 'Inter Tight'; font-size: clamp(40px, 5.5vw, 64px); letter-spacing: -0.04em; font-weight: 700; line-height: 1.02; margin: 0 0 8px; }
.page-meta { color: var(--ink-60); font-size: 14px; margin: 0 0 40px; }

.layout { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(280px, 1fr); gap: 40px; align-items: start; }
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

.card {
  background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.012)), var(--paper-2);
  border: 1px solid var(--line);
  padding: 24px;
  position: relative;
  border-radius: 4px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.30), inset 0 0 0 1px rgba(255,255,255,0.025);
}
.card + .card { margin-top: 14px; }
.summary.card { box-shadow: 0 2px 4px rgba(15,15,15,0.05), 0 12px 32px rgba(15,15,15,0.06); }

.ship-bar { padding: 18px 22px; }
.ship-bar .row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 12px; font-size: 13px; }
.ship-bar .accent { color: var(--accent); font-weight: 700; }
.ship-bar .track { height: 4px; background: rgba(240,235,227,0.08); position: relative; overflow: hidden; border-radius: 2px; }
.ship-bar .fill { position: absolute; inset: 0 auto 0 0; background: var(--accent); transition: width .5s cubic-bezier(.2,.7,.2,1); }
.ship-bar.unlocked { display: flex; gap: 12px; align-items: center; }
.ship-bar.unlocked .icon { width: 32px; height: 32px; border-radius: 999px; background: var(--accent); color: var(--accent-ink); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.line-item { display: flex; gap: 18px; align-items: flex-start; }
.line-item-img {
  width: 124px; height: 124px; flex-shrink: 0;
  background: var(--paper-3); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center; padding: 6px;
}
.line-item-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
.line-item-name { font-family: 'Inter Tight'; font-weight: 700; font-size: 18px; letter-spacing: -0.02em; margin: 0; line-height: 1.15; color: var(--ink); }
.line-item-meta { color: var(--ink-40); font-size: 11px; font-family: 'JetBrains Mono'; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; }

.qty {
  display: inline-flex; align-items: center; gap: 0;
  border: 1px solid var(--line-strong);
  background: var(--paper-3);
}
.qty button {
  width: 44px; height: 44px; background: transparent; border: 0; color: var(--ink-60);
  cursor: pointer; transition: color .2s, background .2s;
  font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center;
}
.qty button:hover:not(:disabled) { color: var(--ink); background: rgba(240,235,227,0.08); }
.qty button:disabled { opacity: 0.3; cursor: not-allowed; }
.qty span { padding: 0 12px; min-width: 28px; text-align: center; font-family: 'Inter Tight'; font-weight: 600; font-size: 13px; }

.icon-btn {
  background: transparent; border: 0; color: var(--ink-40); cursor: pointer;
  padding: 6px; transition: color .2s;
}
.icon-btn:hover { color: var(--accent); }

.summary { position: sticky; top: 96px; }
.summary h2 { font-family: 'Inter Tight'; font-weight: 700; font-size: 16px; letter-spacing: -0.02em; margin: 0 0 4px; }
.summary .lede { color: var(--ink-40); font-size: 11px; font-family: 'JetBrains Mono'; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 22px; }
.row-line { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; font-size: 13px; color: var(--ink-60); }
.row-line .v { color: var(--ink); font-variant-numeric: tabular-nums; }
.divider { height: 1px; background: var(--line); margin: 12px 0; }
.row-line.total { padding-top: 8px; }
.row-line.total .label { font-family: 'Inter Tight'; font-weight: 700; font-size: 14px; color: var(--ink); }
.row-line.total .v { font-family: 'Inter Tight'; font-weight: 700; font-size: 28px; letter-spacing: -0.02em; color: var(--accent); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px 24px;
  border: 1px solid var(--accent); background: var(--accent); color: var(--accent-ink);
  font-family: 'Inter'; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; text-decoration: none;
  transition: background .25s, color .25s, transform .2s, box-shadow .25s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(232,74,58,0.24); }
.btn-secondary {
  background: var(--paper-2); color: var(--ink); border: 1px solid var(--line-strong);
}
.btn-secondary:hover { border-color: var(--ink); transform: translateY(-2px); box-shadow: none; }

.trust { margin-top: 24px; padding-top: 22px; border-top: 1px solid var(--line); }
.trust-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 11px; color: var(--ink-40); font-family: 'JetBrains Mono'; letter-spacing: 0.1em; text-transform: uppercase; }
.trust-row svg { color: var(--accent); flex-shrink: 0; }

/* Empty state */
.empty {
  text-align: center; max-width: 520px; margin: 80px auto 0;
}
.empty-mark {
  width: 88px; height: 88px; border-radius: 999px; margin: 0 auto 28px;
  border: 1px solid var(--line-strong); background: var(--paper-2);
  display: flex; align-items: center; justify-content: center; color: var(--ink-60);
  position: relative;
}
.empty-mark::before {
  content: ''; position: absolute; inset: -4px; border-radius: 999px;
  background: radial-gradient(circle, rgba(232,74,58,0.22) 0%, transparent 70%);
  z-index: -1; filter: blur(20px);
}
.empty h1 { font-family: 'Inter Tight'; font-size: clamp(36px, 5vw, 56px); letter-spacing: -0.04em; font-weight: 700; line-height: 1.05; margin: 0 0 12px; }
.empty h1 em { font-family: 'Inter Tight'; font-style: normal; font-weight: 800; color: var(--accent); }
.empty p { color: var(--ink-60); margin: 0 0 28px; font-size: 16px; }
.empty .recommendations { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; margin-top: 80px; text-align: left; }
@media (max-width: 700px) { .empty .recommendations { grid-template-columns: 1fr; } }
.empty .rec-card {
  background: var(--paper-2); border: 1px solid var(--line); padding: 22px; text-decoration: none; color: var(--ink);
  transition: border-color .25s, transform .25s;
  display: block;
}
.empty .rec-card:hover { border-color: var(--ink-40); transform: translateY(-3px); box-shadow: 0 14px 32px rgba(15,15,15,0.08); }
.empty .rec-card .img-wrap { aspect-ratio: 1; background: var(--paper-3); margin-bottom: 14px; display: flex; align-items: center; justify-content: center; padding: 16px; }
.empty .rec-card .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
.empty .rec-card h3 { font-family: 'Inter Tight'; font-weight: 700; font-size: 18px; letter-spacing: -0.02em; margin: 0; }
.empty .rec-card .tag { font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-top: 4px; }
.empty .rec-card .price-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 14px; }
.empty .rec-card .price { font-family: 'Inter Tight'; font-weight: 700; font-size: 18px; color: var(--accent); }
.empty .rec-card .arrow { font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-40); }

/* Mobile sticky */
.sticky-mobile { display: none; }
@media (max-width: 900px) {
  .summary { position: static; }
  .cart-recs-grid {
    grid-template-columns: 1fr !important;
  }
  .cart-rec-card {
    padding: 14px !important;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
  }
  .cart-rec-add {
    min-width: 64px !important;
    width: auto !important;
    height: 44px !important;
    padding: 0 16px !important;
    font-size: 20px !important;
    flex-shrink: 0;
  }
  .sticky-mobile {
    display: flex; align-items: center; gap: 12px;
    position: fixed; bottom: max(8px, env(safe-area-inset-bottom)); left: 10px; right: 10px; z-index: 50;
    padding: 12px clamp(14px, 4vw, 24px);
    background: rgba(14,13,12,0.96); backdrop-filter: saturate(140%) blur(12px); -webkit-backdrop-filter: saturate(140%) blur(12px);
    border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 -8px 24px rgba(15,15,15,0.06);
  }
  .sticky-mobile .total { flex: 1; }
  .sticky-mobile .total small { display: block; color: var(--ink-40); font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .sticky-mobile .total strong { font-family: 'Inter Tight'; font-weight: 700; font-size: 22px; color: var(--accent); }
  .sticky-mobile .btn { flex: 1.2; padding: 14px 20px; }
}
@media (max-width: 520px) {
  .container { padding-left: 16px; padding-right: 16px; overflow: hidden; }
  .layout, .layout > div, .card { min-width: 0; max-width: 100%; }
  .card { width: 100%; overflow: hidden; }
  .ship-bar.unlocked { align-items: flex-start; }
  .line-item { display: grid; grid-template-columns: 104px minmax(0, 1fr); gap: 14px; }
  .line-item-img { width: 104px; height: 104px; }
  .line-item > div:nth-child(2) > div { min-width: 0; }
  .line-item > div:nth-child(2) > div:first-child { gap: 8px !important; }
  .line-item > div:nth-child(2) > div:last-child { flex-wrap: wrap; gap: 10px; }
  .line-item-name { font-size: 16px; }
  .line-item-meta { font-size: 9.5px; letter-spacing: 0.08em; }
  .cart-rec-card { max-width: 100%; overflow: hidden; }
  .sticky-mobile { left: 10px; right: 10px; max-width: calc(100vw - 20px); }
  .card { padding: 20px; }
  .line-item { gap: 14px; }
  .line-item-img { width: 104px; height: 104px; padding: 5px; }
}
@media (max-width: 380px) {
  .container { padding-left: 12px; padding-right: 12px; }
  .line-item { grid-template-columns: 96px minmax(0, 1fr); gap: 12px; }
  .line-item-img { width: 96px; height: 96px; }
}

/* Step indicator */
.steps { display: inline-flex; gap: 12px; align-items: center; font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-40); }
.steps .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--ink-20); }
.steps .dot.active { background: var(--accent); }
.steps .sep { width: 18px; height: 1px; background: var(--ink-20); }
</style>
